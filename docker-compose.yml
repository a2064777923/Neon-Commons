services:
  app:
    build: .
    container_name: doudezhu_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3100:3100"
      - "3101:3101"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: doudezhu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: doudezhu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: doudezhu_redis
    restart: unless-stopped
    volumes:
      - ./docker-data/redis:/data
